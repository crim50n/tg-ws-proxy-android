name: Build Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.0

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName = ' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\(.*\)"/\1/')
          VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | head -1 | sed 's/.*versionCode = \([0-9]*\)/\1/')
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (code: $VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permissions for gradlew
        run: chmod +x ./gradlew

      - name: Verify version and signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || { echo "::error::KEYSTORE_BASE64 is not configured"; exit 1; }
          test -n "$KEYSTORE_ALIAS" || { echo "::error::KEYSTORE_ALIAS is not configured"; exit 1; }
          test -n "$KEYSTORE_PASSWORD" || { echo "::error::KEYSTORE_PASSWORD is not configured"; exit 1; }

          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$GITHUB_REF_NAME" != "v${{ steps.version.outputs.name }}" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match version v${{ steps.version.outputs.name }}"
            exit 1
          fi

          MANIFEST_VERSION=$(python3 -c 'import json; print(json.load(open("update.json"))["versionName"])')
          MANIFEST_CODE=$(python3 -c 'import json; print(json.load(open("update.json"))["versionCode"])')
          MANIFEST_URL=$(python3 -c 'import json; print(json.load(open("update.json"))["releaseUrl"])')
          EXPECTED_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${{ steps.version.outputs.name }}"
          test "$MANIFEST_VERSION" = "${{ steps.version.outputs.name }}" || { echo "::error::update.json versionName mismatch"; exit 1; }
          test "$MANIFEST_CODE" = "${{ steps.version.outputs.code }}" || { echo "::error::update.json versionCode mismatch"; exit 1; }
          test "$MANIFEST_URL" = "$EXPECTED_URL" || { echo "::error::update.json releaseUrl mismatch"; exit 1; }

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/release.keystore
          echo "keystore=keystore/release.keystore" > app/keystore/signing.properties
          echo "keystore.alias=$KEYSTORE_ALIAS" >> app/keystore/signing.properties
          echo "keystore.password=$KEYSTORE_PASSWORD" >> app/keystore/signing.properties

      - name: Run checks
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mkdir -p release-apks
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::No APK found in app/build/outputs/apk/release/"
            exit 1
          fi
          cp "$APK" "release-apks/tg-ws-proxy-${VERSION}.apk"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-release-${{ steps.version.outputs.name }}
          path: release-apks/*.apk
          retention-days: 90

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          TAG="v${VERSION}"

          if gh release view $TAG > /dev/null 2>&1; then
            echo "Release $TAG already exists, uploading APK..."
            gh release upload $TAG release-apks/*.apk --clobber
          else
            echo "Creating new release $TAG..."
            if [ -f "RELEASE_NOTES_${VERSION}.md" ]; then
              gh release create $TAG \
                --title "${VERSION}" \
                --notes-file "RELEASE_NOTES_${VERSION}.md" \
                release-apks/*.apk
            else
              gh release create $TAG \
                --title "${VERSION}" \
                --generate-notes \
                release-apks/*.apk
            fi
          fi
